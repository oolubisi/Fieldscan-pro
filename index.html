<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FieldScan Pro</title>
  
  <link rel="manifest" href="./manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <!-- Links to your new CSS file -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="sync-status" class="sync-banner" style="display:none;">
    <i class="fas fa-sync-alt fa-spin"></i> Syncing Offline Data...
  </div>

  <div class="app">
    <main class="main">
      
      <!-- DASHBOARD VIEW -->
      <div id="view-dashboard" class="page-view active-view">
        <div class="page-header-simple">
          <h2 class="brand-title"><i class="fas fa-compass"></i> FieldScan Pro</h2>
          <div class="btn-group">
            <button class="action-btn icon-btn" onclick="document.body.classList.toggle('sunlight-mode')"><i class="fas fa-sun"></i></button>
            <button class="action-btn small-btn" onclick="openModal('project')">+ Project</button>
          </div>
        </div>
        
        <div class="dashboard-grid">
          <div class="card dash-card" onclick="showPage('vendors')">
            <div id="badge-vendors" class="dash-badge">--</div>
            <small>Subcontractors</small>
          </div>
          <div class="card dash-card" onclick="showPage('reports')">
            <div class="dash-badge"><i class="fas fa-print"></i></div>
            <small>Reports Engine</small>
          </div>
        </div>

        <h3 class="section-title">Active Projects</h3>
        <input type="text" id="search-projects" class="search-bar" placeholder="Search projects by name..." onkeyup="renderProjects()">
        <div id="project-master-list"></div>
      </div>

      <!-- PROJECT CONSOLE VIEW -->
      <div id="view-project-console" class="page-view">
        <div class="page-header">
          <div class="header-group">
            <button class="home-btn" onclick="showPage('dashboard')"><i class="fas fa-home"></i></button>
            <h2 id="console-title-text">Project Space</h2>
          </div>
        </div>

        <div class="segment-bar">
          <button class="segment-btn active" id="seg-btn-profile" onclick="switchConsoleSegment('profile')">Client</button>
          <button class="segment-btn" id="seg-btn-takeoff" onclick="switchConsoleSegment('takeoff')">Take-Off</button>
          <button class="segment-btn" id="seg-btn-progress" onclick="switchConsoleSegment('progress')">Progress</button>
          <button class="segment-btn" id="seg-btn-workorders" onclick="switchConsoleSegment('workorders')">Orders</button>
        </div>

        <div id="console-seg-profile" class="console-tab-window active-view">
          <div class="card profile-card">
            <h4 class="meta-label">Customer Profile Meta</h4>
            <h3 id="c-meta-name" class="meta-name">--</h3>
            <p class="meta-detail"><i class="fas fa-map-marker-alt"></i> <span id="c-meta-loc">--</span></p>
            <p class="meta-detail"><i class="fas fa-phone"></i> <a id="c-meta-phone" href="#">--</a></p>
            <textarea id="c-meta-notes" disabled class="meta-notes"></textarea>
            <button class="action-btn outline-btn" onclick="triggerEditProjectProfile()">Modify Client Records</button>
          </div>
        </div>

        <div id="console-seg-takeoff" class="console-tab-window page-view">
          <div class="list-header">
            <h3>DIMENSIONAL SURVEY ITEMS</h3>
            <button class="action-btn small-btn" onclick="openModal('takeoff_item')">+ Log Item</button>
          </div>
          <div id="console-takeoff-list"></div>
        </div>

        <div id="console-seg-progress" class="console-tab-window page-view">
          <div class="list-header">
            <h3>TIMELINE LOG FEED</h3>
            <button class="action-btn small-btn success-btn" onclick="openModal('progress_entry')">+ Update Status</button>
          </div>
          <div id="console-progress-feed" class="timeline-feed"></div>
        </div>

        <div id="console-seg-workorders" class="console-tab-window page-view">
          <div class="list-header">
            <h3>SUBCONTRACTOR WORK ORDERS</h3>
            <button class="action-btn small-btn primary-btn" onclick="openModal('workorder')">+ Dispatch</button>
          </div>
          <div id="console-workorders-list"></div>
        </div>
      </div>

      <!-- VENDORS VIEW -->
      <div id="view-vendors" class="page-view">
        <div class="page-header">
          <div class="header-group">
            <button class="home-btn" onclick="showPage('dashboard')"><i class="fas fa-home"></i></button>
            <h2>Subcontractors</h2>
          </div>
          <button class="action-btn add-btn" onclick="openModal('vendor')">+</button>
        </div>
        
        <div class="filter-group">
          <input type="text" id="search-vendor" class="search-bar flex-2" placeholder="Search Name..." onkeyup="renderVendors()">
          <select id="filter-vendor-trade" class="search-bar flex-1" onchange="renderVendors()">
            <option value="">All Trades</option>
          </select>
        </div>

        <div id="vendor-master-list"></div>
      </div>

      <!-- REPORTS VIEW -->
      <div id="view-reports" class="page-view">
        <div class="page-header">
          <div class="header-group">
            <button class="home-btn" onclick="showPage('dashboard')"><i class="fas fa-home"></i></button>
            <h2>Reports Console</h2>
          </div>
        </div>
        <div class="card">
          <label>Select Project</label>
          <select id="rep-project-sel" onchange="handleReportOptionsPopulation()"></select>
          <label>Select Template</label>
          <select id="rep-template-sel"></select>
          <button class="action-btn primary-btn margin-top-15" onclick="compileFieldReport()">Compile Document Bundle</button>
        </div>
        <div id="report-onscreen-preview-card" class="card preview-card" style="display:none;">
          <h4 class="preview-title"><i class="fas fa-eye"></i> Production Print Preview</h4>
          <div id="report-preview-viewport" class="preview-viewport"></div>
          
          <div class="btn-group margin-top-15">
            <button class="action-btn print-btn flex-1" onclick="window.print()"><i class="fas fa-print"></i></button>
            <button class="action-btn whatsapp-btn flex-4" id="btn-share-pdf" onclick="exportAndSharePDF()">
              <i class="fab fa-whatsapp"></i> Share PDF Report
            </button>
          </div>
        </div>

        <button class="action-btn danger-btn margin-top-30" onclick="exportEmergencyOfflineBackup()">
          <i class="fas fa-file-download"></i> Emergency Data Recovery Extract
        </button>
      </div>

    </main>
  </div>

  <div id="report-print-container"></div>

  <!-- MASTER MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Form</h3>
      <div id="modalBody" class="margin-top-15"></div>
      <div class="btn-group margin-top-20">
        <button class="action-btn cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="action-btn" id="modalSubmit">Save</button>
      </div>
    </div>
  </div>

  <!-- Links to your new JS file -->
  <script src="app.js"></script>
</body>
</html>
